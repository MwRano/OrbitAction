name: Build

on:
  # masterへのPRマージをトリガーとしてワークフローを開始する
  pull_request:
    branches:
      - develop
      - main
    types: [closed]

  # 手動実行デバッグ用
  workflow_dispatch: {}

jobs:
  build:
    name: Build my project
    runs-on: ubuntu-latest
    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set CompressionFormat to Disabled
        run: |
          sed -i -e 's/webGLCompressionFormat: ./webGLCompressionFormat: 2/' ProjectSettings/ProjectSettings.asset

      # Debug: Show Library sizes
      - name: Show Library folder sizes (debug)
        run: |
          du -sh Library || true
          du -sh Library/* | sort -h || true

      # Cache: 部分キャッシュ (Library の効果的なサブフォルダのみ)
      - name: Cache important Library folders
        uses: actions/cache@v4
        with:
          path: |
            Library/PackageCache
            Library/ScriptAssemblies
            Library/ShaderCache
          key: Library-partial-${{ hashFiles('Assets/**','Packages/**','ProjectSettings/**') }}-v1
          restore-keys: Library-partial-

      # Build前のディスク掃除
      - name: Free disk space on runner
        run: |
          echo "Space before cleanup:"
          df -h

          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"

          echo "Space after cleanup:"
          df -h

      # Build
      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:   ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          allowDirtyBuild: true
          unityVersion: 6000.0.47f1 # ここは各自プロジェクトに合わせて設定

      # Remove
      - name: Remove symlinks and macOS hidden files
        run: |
          find build -type l -delete || true
          find build -name ".DS_Store" -delete || true

      # Check build size
      - name: Check build size
        run: du -sh build
          
      # Upload
      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: build/WebGL/WebGL

      # Show directory
      - name: Show build folder structure
        run: |
          echo "Contents of build directory:"
          ls -R build
          
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
      - name: Notify Discord - Success
        if: success()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"content\": \"デプロイ完了！最新のビルドデータです。 \n PLAY!!🎮 : ${{ steps.deployment.outputs.page_url }}\"}"

      - name: Notify Discord - Failure
        if: failure()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"content\": \"ビルドエラーです.... \n LOG: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}
